<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/public/assets/css/loginStyles.css">
    <title>Login - Gamer Dailies</title>
    <link rel="shortcut icon" type="image/x-icon" href="/public/assets/images/gamer-dailies-logo.png">

    <!-- Linking the font Outfit from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <section id="loginPage">

        <header>
            <nav>
                <div id="navContainer">
                    <div id="navBrandName">
                        <img src="/public/assets/images/gamer-dailies-logo.png" alt="gamer-dailies-logo" id="brandImage">
                        <h1>Gamer Dailies</h1>
                    </div>
                    <div id="navButton">
                        <button class="btnPlainYellow" id="backBtn"> <strong>Back</strong> </button>
                    </div>
                </div>
            </nav>
        </header>

        <main>
            <div id="loginContainer">
                <h1>Sign In</h1>
                <hr>
                <form id="loginSection">
                    <label for="username">Username:</label>
                    <input type="text" id="username" placeholder="Username"><br>

                    <label for="password">Password:</label>
                    <input type="password" id="password" placeholder="Password"><br><br>

                    <button type="submit" id="loginBtn" class="btnPlainGreen"><strong>Log In</strong></button><br>
                    <p id="errorMsg"></p>

                    <br><p>Don't have an account? <a href="register.html">Register Now!</a></p>
                </form>
            </div>
        </main>

        <footer>
            <h3>&copy;2026 Shark Studios</h3>
        </footer>

    </section>
    
    <script src="js_frontend/auth.js"></script>

</body>
</html>
