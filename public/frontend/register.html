 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/public/assets/css/registerStyles.css">
    <title>Register - Gamer Dailies</title>
    <link rel="shortcut icon" type="image/x-icon" href="/public/assets/images/gamer-dailies-logo.png">

    <!-- Linking the font Outfit from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
 </head>
 <body>
    <section id="registerPage">
        <header>
            <nav>
                <div id="navContainer">
                    <div id="navBrandName">
                        <img src="/public/assets/images/gamer-dailies-logo.png" alt="gamer-dailies-logo" id="brandImage">
                        <h1>Gamer Dailies</h1>
                    </div>
                </div>
            </nav>
        </header>

        <main>
            <div id="registerContainer">
                <h1>Register</h1>
                <hr>
                <form id="registerForm">
                    <label>Name:</label>
                    <input type="text" id="name" required>
                    <br>
                    <!-- no email needed for registering -->
                    
                    <label>Password:</label>
                    <input type="password" id="password" required>
                    <br><br>
                    <button type="submit" id="registerBtn" class="btnPlainOrange"><strong>Register</strong></button>
                </form>

                <p id="errorMsg" style="color:red;"></p>
                <p id="successMsg" style="color:green;"></p>

                <p>Already have an account? <a href="login.html">Login Here!</a></p>
            </div>
            
        </main>

        <footer>
            <h3>&copy;2026 Shark Studios</h3>
        </footer>
    </section>
    <script src="js_frontend/auth.js"></script>
 </body>
 </html>
