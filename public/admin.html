<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/public/assets/css/adminStyles.css">
    <title>Admin - Gamer Dailies</title>
    <link rel="shortcut icon" type="image/x-icon" href="/public/assets/images/gamer-dailies-logo.png">

    <!-- Linking the font Outfit from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <section id="adminPage">

        <header>
            <nav>
                <div id="navContainer">
                    <div id="navBrandName">
                        <img src="/public/assets/images/gamer-dailies-logo.png" alt="gamer-dailies-logo" id="brandImage">
                        <h1>Gamer Dailies</h1>
                    </div>
                    <div id="navButton">
                        <button class="btnPlainYellow" id="logoutBtn"> <strong>Logout</strong> </button>
                    </div>
                </div> 
            </nav>
        </header>

        <div id="adminWelcome">
            <h1>Welcome Admin!</h1>
            <h3>You will find controls to view all products, add new products, 
                update existing products, and delete products. </h3>
        </div>

        <div id="addNew">
            <!-- Can add a new product to the database -->
            <h2>Add New Product</h2>
            <form id="addNewForm">
                <input type="number" id="addIDNum" placeholder="ID"> <br>
                <input type="text" id="addTitle" placeholder="Product Title"> <br>
                <input type="text" id="addShortDesc" placeholder="Short Description"> <br>
                <input type="text" id="addLongDesc" placeholder="Extended Description"> <br>
                <input type="number" id="addPrice" placeholder="Price"> <br> <br>
                
                <label for="addPackageType">Package Type: </label>
                <select id="addPackageType">
                    <option value="Basic Package">Basic Package</option>
                    <option value="Quality Of Life Package">Quality Of Life Package</option>
                    <option value="Deluxe Package">Deluxe Package</option>
                </select> <br> <br>

                <label for="chkAddImage">Add Product Image</label>
                <input type="checkbox" id="chkAddImage" name="chkAddImage">

                <!-- The image options will be hidden unless the user has checked the box to add an image -->
                <input type="text" id="addImage" style="display: none;" placeholder="Image Link">
                <input type="text" id="addImageAlt" style="display: none;" placeholder="Image Alt Description">

                <br><br>
                <button id="addBtn">Add New Product</button>
                <p id="addMessage"></p>
            </form>
        </div>

        <div id="updateExisting">
            <!-- Can update an existing product in the database -->
            <h2>Update Product</h2>
            <form id="updateForm">
                <input type="text" id="updateDatabaseID" placeholder="Database ID (required)"> <br>
                <input type="number" id="updateIDNum" placeholder="Product ID"> <br>
                <input type="text" id="updateTitle" placeholder="Product Title"> <br>
                <input type="text" id="updateShortDesc" placeholder="Short Description"> <br>
                <input type="text" id="updateLongDesc" placeholder="Extended Description"> <br>
                <input type="number" id="updatePrice" placeholder="Price"> <br> <br>
                
                <label for="updatePackageType">Package Type: </label>
                <select id="updatePackageType">
                    <option value="">-- No Change</option>
                    <option value="Basic Package">Basic Package</option>
                    <option value="Quality Of Life Package">Quality Of Life Package</option>
                    <option value="Deluxe Package">Deluxe Package</option>
                </select> <br> <br>
                
                <input type="text" id="updateImage" placeholder="Image Link">
                <input type="text" id="updateImageAlt" placeholder="Image Alt Description">

                <br><br>
                <button id="updateBtn">Update Product</button>
                <p id="updateMessage"></p>
            </form>
        </div>

        <div id="deleteProduct">
            <!-- Can delete an existing product in the database -->
            <h2>Delete A Product</h2>
            <form id="deleteForm">
                <input type="text" id="deleteDatabaseID" placeholder="Database ID (required)"> <br>
                <input type="text" id="deleteTitle" placeholder="Product Title"> <br>

                <button id="deleteBtn">Delete Product</button>
                <p id="deleteMessage"></p>
            </form>
        </div>

        <div id="showAll">
            <!-- Display all products in the database (including all information) -->
            <h2>Show All Product Data</h2>
            <button id="fetchBtn">Show All</button>

            <div id="allProductData">
                <!-- All data will be pulled from the MongoDB database -->
            </div>
        </div>

        <footer>
            <h3>&copy;2026 Shark Studios</h3>
        </footer>

    </section>
    
    <script src="/public/assets/javascript/admin.js"></script>
    
</body>
</html>
